# docker with Ansible
hosts :  web
become : yes

vars :
  port_mapping : "80:8080"

tasks :
  - name : Install Docker
    apt :
      name : docker.io
      state : present
  - name: Start docker
    service :
      name : docker
      state : started

  - name : Run app container
    docker_container :
      name  : my_app
      image : abhijeet/my-app:latest
      state : started
      ports :
        - {{port_mapping}}

handlers :
  - name : restart
    service :
      name : app
      state : restarted