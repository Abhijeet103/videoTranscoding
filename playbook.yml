- hosts: web
  become: yes

  vars :
    port_mapping : "80:8080"

  tasks:
    - name: Install nginx
      yum:
        name: nginx
        state: present

    - name : Install Docker
      yum :
        name : docker.io
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name : Start Docker
      service :
        name : docker
        state : started

    - name : Run container docker
      docker_container :
        name : my-app
        image : httpd
        state : started
        ports :
          - {{port_mapping}}




